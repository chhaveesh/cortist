# Local development stack: gateway + worker + Postgres + Redis.
#
# The gateway and worker are two services built from ONE image, differing only
# in their command. That keeps the build simple while preserving the process
# boundary Phase 2 needs to scale the worker independently
# (`docker compose up --scale worker=4`).

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cortist}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cortist}
      POSTGRES_DB: ${POSTGRES_DB:-cortist}
    # Published only for convenience (psql from the host). Services talk to
    # each other over the compose network on 5432 regardless, so change the
    # host side freely if you already run Postgres locally.
    ports:
      - '${POSTGRES_HOST_PORT:-5432}:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-cortist} -d ${POSTGRES_DB:-cortist}']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ['redis-server', '--appendonly', 'yes']
    ports:
      - '${REDIS_HOST_PORT:-6379}:6379'
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

  # Applies migrations once, then exits. Both app services wait on it so they
  # never start against an un-migrated database.
  migrate:
    build:
      context: .
      target: runtime
    env_file: .env
    command: ['npx', 'prisma', 'migrate', 'deploy']
    depends_on:
      postgres:
        condition: service_healthy
    restart: 'no'

  gateway:
    build:
      context: .
      target: runtime
    env_file: .env
    command: ['node', 'dist/main.js']
    ports:
      - '${PORT:-3000}:${PORT:-3000}'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'node -e "fetch(''http://localhost:''+(process.env.PORT||3000)+''/health'').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  worker:
    build:
      context: .
      target: runtime
    env_file: .env
    command: ['node', 'dist/worker.js']
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:
